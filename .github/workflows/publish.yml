name: "CD: Publish CodeQL Packs"

on:
  workflow_dispatch:
    inputs:
      target_language:
        description: 'Language to publish (leave as "all" to publish everything)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - java
          - csharp

jobs:
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      languages: ${{ steps.set-matrix.outputs.languages }}
    steps:
      - id: set-matrix
        run: |
          # 1. Determine the list of languages based on input vs push
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.target_language }}" != "all" ]]; then
            # Manual trigger for a single language
            LITERAL="[\"${{ github.event.inputs.target_language }}\"]"
          else
            # Manual 'all' OR a standard Git Push triggers everything
            LITERAL='["java", "csharp"]'
          fi
          
          echo "languages=$LITERAL" >> $GITHUB_OUTPUT

  publish-packs:
    needs: prepare-matrix
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJson(needs.prepare-matrix.outputs.languages) }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - uses: trailofbits/setup-codeql@main
        with:
          version: '2.25.1'
          platform: 'linux64'
          checksum: '4f070e6cc7009e75aec307ed109c2fcf0501e579c20a31080b893e31209523d5'

      - name: Install Dependencies
        run: |
          find ql/${{ matrix.language }} -name "qlpack.yml" -execdir codeql pack install \;

      - name: Publish Packs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Loop through all packs and attempt to publish
          # If version exists, it logs a warning and moves to the next one
          find ql/${{ matrix.language }} -name "qlpack.yml" | while read pack; do
            dir=$(dirname "$pack")
            echo "Publishing pack in $dir..."
            
            codeql pack publish -- "$dir" || echo "::warning title=Skip Publish::Version in $dir already exists in registry. Skipping."
          done
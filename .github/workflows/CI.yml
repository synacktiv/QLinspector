name: "CI: Build CodeQL Packs"

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'ql/**'
  push:
    branches: [ main ]
    paths:
      - 'ql/**'
  workflow_dispatch:

jobs:
  test-packs:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ["java", "csharp"]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Check for changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            changed:
              - '${{ matrix.language }}/**'

      - name: Skip if no changes
        if: steps.filter.outputs.changed != 'true' && github.event_name != 'workflow_dispatch'
        shell: bash
        run: |
          echo "No changes detected for ${{ matrix.language }}. Exiting gracefully."
          exit 0

      - uses: trailofbits/setup-codeql@main
        with:
          version: '2.25.1'
          platform: 'linux64'
          checksum: '4f070e6cc7009e75aec307ed109c2fcf0501e579c20a31080b893e31209523d5'

      - name: Install Dependencies
        run: |
          # Find all packs for the matrix language and install deps
          find "ql/${{ matrix.language }}" -name "qlpack.yml" -execdir codeql pack install \;

      - name: Run Tests
        run: |
          # Run tests for any folder named 'test' inside the language directory
          if [ -d "ql/${{ matrix.language }}/test" ]; then
            codeql test run ql/${{ matrix.language }}/test
          else
            echo "No tests found for ${{ matrix.language }}, skipping."
          fi

      - name: Verify Compilation
        run: |
          # Variable to track if any pack fails
          FAILED=0

          # Find all qlpack.yml files in the language directory
          # We use a while loop to ensure we can catch errors from each execution
          while read -r pack; do
            dir=$(dirname "$pack")

            echo "--------------------------------------------------"
            echo "Compiling pack in: $dir"
            
            # Run the command. If it fails, set our FAILED flag to 1
            if ! codeql pack create "$dir"; then
              echo "::error::Compilation failed for pack in $dir"
              FAILED=1
            fi

          done < <(find "ql/${{ matrix.language }}" -name "qlpack.yml")

          # If any pack failed, exit with a non-zero code to fail the CI job
          if [ $FAILED -ne 0 ]; then
            echo "One or more CodeQL packs failed to compile. Check the logs above."
            exit 1
          fi
on:
  push:
    branches:
      - main
    paths:
      - 'ql/**'

permissions:
  contents: write
  pull-requests: write
  issues: write

name: release-please
jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json
